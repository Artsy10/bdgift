<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link rel="icon" type="image/png" href="confetti.png">

<style>
/* ===== GLOBAL STYLES ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: url('bg.jpg') no-repeat center center;
  background-size: cover;
  overflow-x: hidden;
  position: relative;
}

/* ===== HINT ===== */
.hint {
  position: absolute;
  top: 10px;
  color: #fff;
  font-size: 18px;
  opacity: 0.7;
  animation: fadeBlink 2s infinite;
}

@keyframes fadeBlink {
  0%,100% { opacity: 0.7; }
  50% { opacity: 0.2; }
}

/* ===== CARD CONTAINER ===== */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}

/* ===== CARD ===== */
.card {
  width: 50vw;
  max-width: 500px;   /* Desktop cap */
  min-width: 250px;   /* Mobile floor */
  height: auto;
  aspect-ratio: 1562/2082;
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 10px;
  overflow: hidden;
}

.front img, .back img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.back {
  transform: rotateY(180deg);
  position: relative;
}

.back-content {
  opacity: 0;
  transition: opacity 0.8s ease;
}

.back.show .back-content {
  opacity: 1;
}

/* ===== HEARTS ===== */
.heart {
  position: absolute;
  color: pink;
  font-size: 16px;
  animation: floatUp 5s linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% { transform: translateY(100px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-500px); opacity: 0; }
}

/* ===== MUSIC BUTTON ===== */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;      /* bigger for mobile */
  height: 50px;
  cursor: pointer;
  opacity: 0.8;
  z-index: 1000;
}

.music-btn img {
  width: 100%;
  height: 100%;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .card {
    width: 60vw;
    max-width: 400px;
  }
}

@media (max-width: 768px) {
  .card {
    width: 80vw;
    max-width: 300px;
    min-width: 200px;
  }

  .hint {
    font-size: 14px;
  }

  .heart {
    font-size: 12px;
  }

  .music-btn {
    width: 60px;
    height: 60px;
  }
}

@media (max-width: 480px) {
  .card {
    width: 90vw;
    max-width: 280px;
    min-width: 180px;
  }

  .music-btn {
    width: 70px;
    height: 70px;
  }
}
</style>
</head>

<body>

<div class="hint" id="hint">Tap the card 💌</div>

<div class="container">

  <div class="card" onclick="flipCard()">
    <div class="card-inner">
      <div class="card-face front">
        <img src="front.png" alt="Front">
      </div>
      <div class="card-face back" id="back">
        <div class="back-content">
          <img src="back.png" alt="Back">
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Music -->
<audio id="music" src="music.mp3" loop></audio>
<div class="music-btn" onclick="toggleMusic()" id="musicBtn">
  <img src="sound-on.png" alt="Music Button">
</div>

<script>
let flipped = false;
let heartsCreated = false;

const music = document.getElementById('music');
music.volume = 0.2;

// Start music on first click anywhere
window.addEventListener("click", () => {
  if (music.paused) music.play();
}, { once: true });

// Flip card function
function flipCard() {
  const card = document.querySelector('.card');
  const hint = document.getElementById('hint');
  const back = document.getElementById('back');

  flipped = !flipped;
  card.classList.toggle('flipped');

  hint.style.display = flipped ? "none" : "block";

  if (!heartsCreated) {
    createHearts();
    heartsCreated = true;
  }

  if (flipped) {
    setTimeout(() => back.classList.add("show"), 250);
  } else {
    back.classList.remove("show");
  }
}

// Toggle music
function toggleMusic() {
  const btn = document.getElementById("musicBtn");
  if (music.paused) {
    music.play();
    btn.innerHTML = '<img src="sound-on.png" alt="Music On">';
  } else {
    music.pause();
    btn.innerHTML = '<img src="sound-off.png" alt="Music Off">';
  }
}

// Create floating hearts
function createHearts() {
  const container = document.getElementById('back');

  for (let i = 0; i < 8; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    let side = Math.random() < 0.5 ? "left" : "right";
    heart.style[side] = Math.random() * 20 + "px";
    heart.style.animationDelay = Math.random() * 3 + "s";

    container.appendChild(heart);
  }
}
</script>

</body>
</html>
